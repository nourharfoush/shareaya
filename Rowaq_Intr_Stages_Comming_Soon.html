<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="رواق العلوم الشرعية والعربية - قريبًا إن شاء الله">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قريباً - رواق العلوم الشرعية والعربية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle-btn" id="themeToggle" title="تبديل المظهر الداكن/المضيء">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="app-container">
        <!-- Back Button -->
        <div class="back-btn-container">
            <a href="Rowaq_Stages.html" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
                <span>العودة للرئيسية</span>
            </a>
        </div>

        <!-- Coming Soon Content -->
        <main class="coming-soon-container">
            <div class="coming-soon-card">
                <div class="coming-soon-icon">⏳</div>
                <h1 class="coming-soon-title">Comming Soon..!</h1>
                <p class="coming-soon-text" style="font-size: 1.5rem; font-family: var(--font-amiri); color: var(--accent-color);">
                    قريبًا إن شاء الله تبارك وتعالى
                </p>
                <p class="coming-soon-text">
                    يجري العمل حالياً على إعداد وتجهيز المواد التعليمية والمقررات الدراسية لهذه الشعبة لتكون متاحة لكم في أقرب وقت. نسأل الله لنا ولكم التوفيق والسداد.
                </p>
                <div style="margin-top: 20px; width: 100%;">
                    <a href="Rowaq_Stages.html" class="rowaq-btn rowaq-btn-primary">
                        <span>العودة لصفحة المراحل الدراسية</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </a>
                </div>
            </div>
        </main>

        <!-- Footer Section -->
        <footer class="footer-section">
            <div class="footer-credit">تم بحمد الله تعالى وتوفيقه</div>
            <a href="mailto:info@alquranulhakeem.net" class="footer-contact">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span>info@alquranulhakeem.net</span>
            </a>
        </footer>
    </div>

    <!-- Security & Theme Switcher Script -->
    <script>
        // Disable context menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Dark/Light Theme Switcher script
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // Check for saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.innerHTML = `
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                `;
            } else {
                themeIcon.innerHTML = `
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                `;
            }
        }
    </script>
</body>
</html>
